services:

    frontend:
        build:
            context: .
            dockerfile: Dockerfile.prod
        container_name: neprikosnovenna-frontend
        ports:
            - "8080:8080"
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 128M
        depends_on:
            api:
                condition: service_healthy
        networks:
            - neprikosnovenna-net

    api:
        build:
            context: ./server
            dockerfile: Dockerfile
        container_name: neprikosnovenna-api
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M
        environment:
            - PORT=3001
            - DB_DIR=/app/data
        volumes:
            - sqlite-data:/app/data
        networks:
            - neprikosnovenna-net

volumes:
    sqlite-data:
        name: neprikosnovenna-sqlite

networks:
    neprikosnovenna-net:
        name: neprikosnovenna-net
        driver: bridge
