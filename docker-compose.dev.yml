services:

    react-app:
        build:
            context: .
            dockerfile: Dockerfile.dev.react
        container_name: react-app
        ports:
            - "8080:5173"
        volumes:
            - ./src:/app/src
            - ./public:/app/public
        environment:
            - CHOKIDAR_USEPOLLING=true
            - API_URL=http://api:3001
        depends_on:
            - api

    api:
        build:
            context: ./server
            dockerfile: Dockerfile
        container_name: fingerprints-api
        ports:
            - "3001:3001"
        volumes:
            - ./server/data:/app/data
        environment:
            - PORT=3001
